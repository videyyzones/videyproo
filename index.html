<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videy Zone</title>

<style>
body { margin:0; font-family:Arial; background:#fff; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.item { cursor:pointer; }

.item video {
  width:100%;
  border-radius:10px;
}
.item-title {
  font-size:13px;
}
</style>
</head>

<body>

<!-- POPUNDER -->
<script>
(function(s){
  s.dataset.zone='10911170',
  s.src='https://al5sm.com/tag.min.js'
})([document.documentElement, document.body]
.filter(Boolean).pop()
.appendChild(document.createElement('script')))
</script>

<div class="grid" id="videoList"></div>

<script>
let clicked = false;

function openVideo(i) {
  location.href = 'video.html?id=' + i;

  if (!clicked) {
    clicked = true;
    window.open("https://omg10.com/4/10911172", "_blank");
  }
}

fetch('videos.json')
.then(res => res.json())
.then(data => {

  let html = "";

  data.forEach((vid, i) => {
    html += `
      <div class="item" onclick="openVideo(${i})">
        <video src="${vid.file}"></video>
        <div class="item-title">${vid.title}</div>
      </div>
    `;
  });

  document.getElementById("videoList").innerHTML = html;
});
</script>

</body>
</html>
